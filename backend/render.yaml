services:
  - type: web
    name: spms-backend
    runtime: node
    repo: https://github.com/neagsom229-lang/SPMS_Chh_Sn
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://spms-chh-sn-pro.vercel.app